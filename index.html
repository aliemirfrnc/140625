<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aşk Ağacım 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #e8678a;
    --blush: #f2a7bb;
    --petal: #fce4ec;
    --deep: #8b1a4a;
    --gold: #d4a85c;
    --cream: #fff5f7;
    --night: #0d0618;
    --twilight: #1a0a2e;
    --starlight: rgba(255,220,230,0.9);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--night);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: default;
  }

  /* ── SKY ── */
  #sky {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #2d0a3e 0%, #140526 40%, #0d0618 100%);
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--min); transform: scale(1); }
    to   { opacity: 1; transform: scale(1.4); }
  }

  /* ── GROUND ── */
  #ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 22vh;
    background: linear-gradient(to top, #1a0a12, #2a0e20, transparent);
    z-index: 1;
  }

  /* ── PARTICLES ── */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
  .heart-particle {
    position: absolute;
    font-size: 14px;
    animation: floatUp var(--spd) ease-in forwards;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { opacity: 0.8; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-80vh) scale(0.3) rotate(360deg); }
  }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50;
    background: radial-gradient(ellipse at center, #1a0328 0%, #0d0618 100%);
    transition: opacity 1.2s ease, visibility 1.2s;
  }
  #intro.hidden { opacity: 0; visibility: hidden; }

  .intro-heart {
    font-size: clamp(60px, 12vw, 100px);
    animation: pulse 2s ease-in-out infinite;
    margin-bottom: 24px;
    filter: drop-shadow(0 0 30px #e8678a);
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .typewriter-wrap {
    text-align: center;
    padding: 0 20px;
    max-width: 600px;
  }
  #typewriter-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 38px);
    color: var(--starlight);
    line-height: 1.5;
    min-height: 2.5em;
  }
  .cursor {
    display: inline-block;
    width: 3px;
    height: 1em;
    background: var(--rose);
    margin-left: 4px;
    animation: blink 0.7s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .intro-btn {
    margin-top: 48px;
    padding: 16px 48px;
    background: transparent;
    border: 1.5px solid var(--rose);
    color: var(--blush);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 40px;
    transition: all 0.4s ease;
    opacity: 0;
    animation: fadeUp 0.8s ease 3.5s forwards;
    text-transform: uppercase;
  }
  .intro-btn:hover {
    background: var(--rose);
    color: white;
    box-shadow: 0 0 40px rgba(232, 103, 138, 0.5);
    transform: scale(1.05);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MAIN SCENE ── */
  #scene {
    position: fixed; inset: 0;
    z-index: 3;
    opacity: 0;
    transition: opacity 1.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #scene.visible { opacity: 1; }

  /* ── TREE SVG ── */
  #tree-container {
    position: relative;
    width: min(520px, 90vw);
    height: min(600px, 88vh);
    animation: treeSway 6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes treeSway {
    0%,100% { transform: rotate(-0.5deg); }
    50% { transform: rotate(0.5deg); }
  }

  #tree-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 60px rgba(232, 103, 138, 0.15));
  }

  /* ── LETTER NODES ── */
  .letter-node {
    position: absolute;
    cursor: pointer;
    transform: translate(-50%, -50%);
    z-index: 10;
    transition: transform 0.3s ease;
  }
  .letter-node:hover { transform: translate(-50%, -50%) scale(1.25); }
  .letter-node:hover .letter-icon { animation: nodeShake 0.4s ease; }

  @keyframes nodeShake {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-12deg); }
    75% { transform: rotate(12deg); }
  }

  .letter-icon {
    width: clamp(36px, 7vw, 54px);
    height: clamp(36px, 7vw, 54px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(18px, 3.5vw, 26px);
    box-shadow: 0 0 20px rgba(232,103,138,0.6), 0 0 60px rgba(232,103,138,0.2);
    animation: glowPulse 3s ease-in-out infinite;
    border: 1.5px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    background: radial-gradient(circle at 30% 30%, rgba(255,180,200,0.3), rgba(140,20,60,0.6));
  }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 20px rgba(232,103,138,0.5); }
    50% { box-shadow: 0 0 35px rgba(232,103,138,0.9), 0 0 70px rgba(232,103,138,0.3); }
  }

  .letter-label {
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: rgba(255,200,215,0.7);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .letter-node:hover .letter-label { opacity: 1; }

  /* ── TITLE ── */
  #site-title {
    position: fixed;
    top: 5vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    opacity: 0;
    transition: opacity 1.5s 0.5s;
  }
  #site-title.visible { opacity: 1; }
  #site-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 400;
    font-style: italic;
    color: var(--starlight);
    letter-spacing: 2px;
    text-shadow: 0 0 40px rgba(232,103,138,0.6);
  }
  #site-title p {
    font-size: clamp(11px, 1.8vw, 14px);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(242, 167, 187, 0.6);
    margin-top: 6px;
  }

  /* ── MUSIC BUTTON ── */
  #music-btn {
    position: fixed;
    bottom: 30px; right: 30px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(232,103,138,0.15);
    border: 1.5px solid rgba(232,103,138,0.4);
    color: var(--blush);
    font-size: 20px;
    cursor: pointer;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }
  #music-btn:hover {
    background: rgba(232,103,138,0.3);
    box-shadow: 0 0 20px rgba(232,103,138,0.4);
  }
  #music-btn.playing { animation: musicPulse 2s ease-in-out infinite; }
  @keyframes musicPulse {
    0%,100% { box-shadow: 0 0 10px rgba(232,103,138,0.3); }
    50% { box-shadow: 0 0 25px rgba(232,103,138,0.7); }
  }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 3, 20, 0.85);
    backdrop-filter: blur(12px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
    padding: 20px;
  }
  #modal-overlay.open { opacity: 1; pointer-events: all; }

  #modal {
    background: linear-gradient(145deg, #1e0a2a, #2a0e1e);
    border: 1px solid rgba(232,103,138,0.25);
    border-radius: 24px;
    width: min(680px, 95vw);
    max-height: 90vh;
    overflow: hidden;
    box-shadow: 0 30px 100px rgba(0,0,0,0.8), 0 0 60px rgba(232,103,138,0.1);
    transform: scale(0.85) translateY(30px);
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; flex-direction: column;
  }
  #modal-overlay.open #modal { transform: scale(1) translateY(0); }

  .modal-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid rgba(232,103,138,0.15);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 400;
    font-style: italic;
    color: var(--starlight);
  }
  .modal-header .modal-date {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--blush);
    opacity: 0.7;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .modal-close {
    background: none; border: none;
    color: rgba(255,200,215,0.5);
    font-size: 24px; cursor: pointer;
    padding: 4px; line-height: 1;
    transition: color 0.2s, transform 0.2s;
    flex-shrink: 0;
    margin-left: 16px;
  }
  .modal-close:hover { color: var(--blush); transform: scale(1.2); }

  .modal-body { padding: 24px 32px; overflow-y: auto; flex: 1; }

  /* Photo Slider */
  .photo-slider {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(0,0,0,0.3);
    aspect-ratio: 4/3;
    margin-bottom: 20px;
  }
  .photo-slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .photo-slide.active { opacity: 1; }
  .photo-slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 16px;
  }
  .photo-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #2a0e2a, #1a0835);
    color: rgba(255,200,215,0.5);
    font-size: 48px;
    gap: 16px;
  }
  .photo-placeholder p {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,200,215,0.4);
  }

  .slider-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-bottom: 20px;
  }
  .slider-btn {
    background: rgba(232,103,138,0.15);
    border: 1px solid rgba(232,103,138,0.3);
    color: var(--blush); font-size: 18px;
    width: 38px; height: 38px; border-radius: 50%;
    cursor: pointer; transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .slider-btn:hover { background: rgba(232,103,138,0.35); }
  .slider-dots { display: flex; gap: 8px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(232,103,138,0.25);
    cursor: pointer; transition: all 0.3s;
  }
  .dot.active { background: var(--rose); transform: scale(1.3); }

  .modal-message {
    font-size: clamp(15px, 2vw, 17px);
    line-height: 1.8;
    color: rgba(255,220,230,0.85);
    font-style: italic;
    text-align: center;
    padding: 0 8px;
  }

  /* ── FINAL MODAL (Seni Seviyorum) ── */
  #final-overlay {
    position: fixed; inset: 0;
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    background: rgba(8,2,16,0.95);
    backdrop-filter: blur(20px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #final-overlay.open { opacity: 1; pointer-events: all; }

  .final-content {
    text-align: center;
    padding: 40px;
    max-width: 500px;
    transform: scale(0.8);
    transition: transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  #final-overlay.open .final-content { transform: scale(1); }

  .final-hearts {
    font-size: 60px;
    animation: pulse 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 30px #e8678a);
    margin-bottom: 30px;
  }
  .final-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 700;
    font-style: italic;
    color: white;
    text-shadow: 0 0 60px rgba(232,103,138,0.8), 0 0 120px rgba(232,103,138,0.4);
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .final-subtitle {
    font-size: clamp(16px, 2.5vw, 22px);
    color: rgba(255,200,215,0.8);
    line-height: 1.7;
    font-style: italic;
    margin-bottom: 40px;
  }
  .final-close {
    padding: 14px 40px;
    background: transparent;
    border: 1.5px solid rgba(232,103,138,0.5);
    color: var(--blush);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 40px;
    transition: all 0.4s ease;
    text-transform: uppercase;
  }
  .final-close:hover {
    background: rgba(232,103,138,0.2);
    box-shadow: 0 0 30px rgba(232,103,138,0.4);
  }

  /* ── PETAL RAIN ── */
  .petal {
    position: fixed;
    top: -30px;
    pointer-events: none;
    z-index: 1;
    animation: petalFall linear forwards;
    opacity: 0.7;
    font-size: 14px;
  }
  @keyframes petalFall {
    0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(var(--drift)); opacity: 0; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .modal-header { padding: 20px; }
    .modal-body { padding: 16px 20px; }
    #music-btn { bottom: 20px; right: 20px; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div id="sky"></div>
<div id="ground"></div>
<div id="particles"></div>

<!-- ══════════════ INTRO SCREEN ══════════════ -->
<div id="intro">
  <div class="intro-heart">🌸</div>
  <div class="typewriter-wrap">
    <div id="typewriter-text"><span id="tw-span"></span><span class="cursor"></span></div>
  </div>
  <button class="intro-btn" id="enter-btn" onclick="enterSite()">Gir ♡</button>
</div>

<!-- ══════════════ MAIN SCENE ══════════════ -->
<div id="site-title">
  <h1>Aşk Ağacımız</h1>
  <p>Her dal bir anı taşır</p>
</div>

<div id="scene">
  <div id="tree-container">
    <!-- TREE SVG -->
    <svg id="tree-svg" viewBox="0 0 520 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="trunkGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#6b2d3a"/>
          <stop offset="100%" stop-color="#2a0e18"/>
        </radialGradient>
        <radialGradient id="leafGrad1" cx="40%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#4a1535" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#1e0828" stop-opacity="0.7"/>
        </radialGradient>
        <radialGradient id="leafGrad2" cx="50%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#5c1a40"/>
          <stop offset="100%" stop-color="#200930"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softGlow">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Roots -->
      <path d="M240 575 Q210 560 185 568 Q200 555 230 552" stroke="#3a1520" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M280 575 Q310 558 335 565 Q318 553 290 550" stroke="#3a1520" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M260 578 Q255 562 250 550" stroke="#3a1520" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- Trunk -->
      <path d="M230 570 Q220 500 225 440 Q228 400 240 360 Q248 330 255 295" stroke="url(#trunkGrad)" stroke-width="28" fill="none" stroke-linecap="round"/>
      <path d="M290 570 Q300 500 295 440 Q292 400 280 360 Q272 330 265 295" stroke="url(#trunkGrad)" stroke-width="20" fill="none" stroke-linecap="round"/>
      <path d="M260 570 Q260 490 260 440 Q260 380 260 295" stroke="#3a1520" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>

      <!-- Trunk texture lines -->
      <path d="M245 500 Q255 495 265 500" stroke="#4a1a28" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M243 460 Q255 455 267 460" stroke="#4a1a28" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M248 420 Q258 415 270 418" stroke="#4a1a28" stroke-width="2" fill="none" opacity="0.4"/>

      <!-- Main branches -->
      <!-- Left large branch -->
      <path d="M248 380 Q210 340 165 320 Q135 308 100 315" stroke="#4a2030" stroke-width="14" fill="none" stroke-linecap="round"/>
      <!-- Right large branch -->
      <path d="M272 370 Q310 330 355 315 Q385 305 420 312" stroke="#4a2030" stroke-width="14" fill="none" stroke-linecap="round"/>
      <!-- Left mid branch -->
      <path d="M243 335 Q210 295 180 278 Q155 265 128 268" stroke="#4a2030" stroke-width="10" fill="none" stroke-linecap="round"/>
      <!-- Right mid branch -->
      <path d="M277 325 Q308 288 338 275 Q362 265 390 270" stroke="#4a2030" stroke-width="10" fill="none" stroke-linecap="round"/>
      <!-- Top center branches -->
      <path d="M258 290 Q235 255 215 240 Q198 228 185 225" stroke="#4a2030" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M262 285 Q285 250 305 235 Q322 223 338 220" stroke="#4a2030" stroke-width="8" fill="none" stroke-linecap="round"/>
      <!-- Small sub-branches -->
      <path d="M165 320 Q150 300 140 290" stroke="#4a2030" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M165 320 Q168 296 172 284" stroke="#4a2030" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M355 315 Q370 296 380 285" stroke="#4a2030" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M355 315 Q352 295 348 282" stroke="#4a2030" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M128 268 Q115 250 108 238" stroke="#4a2030" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M390 270 Q400 252 405 240" stroke="#4a2030" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M185 225 Q178 208 174 196" stroke="#4a2030" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M338 220 Q345 203 348 192" stroke="#4a2030" stroke-width="4" fill="none" stroke-linecap="round"/>

      <!-- Leaf clusters (large blobs) -->
      <!-- Bottom left cluster -->
      <ellipse cx="140" cy="295" rx="68" ry="55" fill="url(#leafGrad1)" opacity="0.85" filter="url(#softGlow)"/>
      <ellipse cx="118" cy="278" rx="48" ry="40" fill="url(#leafGrad2)" opacity="0.75"/>
      <ellipse cx="162" cy="283" rx="52" ry="42" fill="url(#leafGrad1)" opacity="0.7"/>

      <!-- Bottom right cluster -->
      <ellipse cx="385" cy="290" rx="68" ry="55" fill="url(#leafGrad1)" opacity="0.85" filter="url(#softGlow)"/>
      <ellipse cx="408" cy="275" rx="48" ry="40" fill="url(#leafGrad2)" opacity="0.75"/>
      <ellipse cx="362" cy="280" rx="52" ry="42" fill="url(#leafGrad1)" opacity="0.7"/>

      <!-- Mid left cluster -->
      <ellipse cx="155" cy="248" rx="60" ry="50" fill="url(#leafGrad2)" opacity="0.8" filter="url(#softGlow)"/>
      <ellipse cx="133" cy="235" rx="44" ry="36" fill="url(#leafGrad1)" opacity="0.7"/>

      <!-- Mid right cluster -->
      <ellipse cx="370" cy="248" rx="60" ry="50" fill="url(#leafGrad2)" opacity="0.8" filter="url(#softGlow)"/>
      <ellipse cx="392" cy="232" rx="44" ry="36" fill="url(#leafGrad1)" opacity="0.7"/>

      <!-- Upper left cluster -->
      <ellipse cx="195" cy="210" rx="55" ry="46" fill="url(#leafGrad1)" opacity="0.85" filter="url(#softGlow)"/>
      <ellipse cx="175" cy="196" rx="40" ry="34" fill="url(#leafGrad2)" opacity="0.75"/>

      <!-- Upper right cluster -->
      <ellipse cx="328" cy="210" rx="55" ry="46" fill="url(#leafGrad1)" opacity="0.85" filter="url(#softGlow)"/>
      <ellipse cx="348" cy="196" rx="40" ry="34" fill="url(#leafGrad2)" opacity="0.75"/>

      <!-- Top center cluster (crown) -->
      <ellipse cx="260" cy="175" rx="80" ry="65" fill="url(#leafGrad2)" opacity="0.9" filter="url(#softGlow)"/>
      <ellipse cx="240" cy="158" rx="58" ry="50" fill="url(#leafGrad1)" opacity="0.8"/>
      <ellipse cx="282" cy="155" rx="58" ry="48" fill="url(#leafGrad2)" opacity="0.8"/>
      <ellipse cx="260" cy="138" rx="50" ry="40" fill="url(#leafGrad1)" opacity="0.85"/>

      <!-- Subtle pink blossom dots on leaves -->
      <circle cx="148" cy="282" r="3" fill="#e8678a" opacity="0.4" filter="url(#glow)"/>
      <circle cx="132" cy="270" r="2.5" fill="#f2a7bb" opacity="0.5" filter="url(#glow)"/>
      <circle cx="165" cy="268" r="2" fill="#e8678a" opacity="0.4"/>
      <circle cx="390" cy="280" r="3" fill="#e8678a" opacity="0.4" filter="url(#glow)"/>
      <circle cx="375" cy="265" r="2.5" fill="#f2a7bb" opacity="0.5"/>
      <circle cx="404" cy="268" r="2" fill="#e8678a" opacity="0.4"/>
      <circle cx="200" cy="198" r="2.5" fill="#f2a7bb" opacity="0.5" filter="url(#glow)"/>
      <circle cx="320" cy="200" r="2.5" fill="#f2a7bb" opacity="0.5" filter="url(#glow)"/>
      <circle cx="250" cy="148" r="3" fill="#e8678a" opacity="0.5" filter="url(#glow)"/>

    </svg>

    <!-- ══ LETTER NODES (pozisyonlar ağaç dallarına göre) ══ -->
    <!-- Her .letter-node için: left/top = ağaç üzerindeki konum (yüzde) -->

    <div class="letter-node" style="left:20%;top:53%" onclick="openMemory(0)">
      <div class="letter-icon">💌</div>
      <span class="letter-label">İlk Günümüz</span>
    </div>

    <div class="letter-node" style="left:79%;top:51%" onclick="openMemory(1)">
      <div class="letter-icon">🌹</div>
      <span class="letter-label">İlk Öpücük</span>
    </div>

    <div class="letter-node" style="left:24%;top:42%" onclick="openMemory(2)">
      <div class="letter-icon">📸</div>
      <span class="letter-label">Fotoğraflarımız</span>
    </div>

    <div class="letter-node" style="left:76%;top:41%" onclick="openMemory(3)">
      <div class="letter-icon">✨</div>
      <span class="letter-label">Özel Anlar</span>
    </div>

    <div class="letter-node" style="left:33%;top:32%" onclick="openMemory(4)">
      <div class="letter-icon">🎵</div>
      <span class="letter-label">Şarkımız</span>
    </div>

    <div class="letter-node" style="left:67%;top:31%" onclick="openMemory(5)">
      <div class="letter-icon">🌙</div>
      <span class="letter-label">Gecelerimiz</span>
    </div>

    <div class="letter-node" style="left:50%;top:22%" onclick="openMemory(6)">
      <div class="letter-icon">💖</div>
      <span class="letter-label">Seni Seviyorum</span>
    </div>
  </div>
</div>

<!-- Music Button -->
<button id="music-btn" onclick="toggleMusic()" title="Müzik aç/kapat">🎵</button>

<!-- Hidden audio -->
<!--
  !! MÜZİK EKLEMEk İÇİN !!
  Aşağıdaki <audio> tag'ının src="music/song.mp3" kısmını
  kendi müzik dosyanızın yolu ile değiştirin.
  Örnek: src="music/ed-sheeran-perfect.mp3"
-->
<audio id="bg-music" loop>
  <source src="music/song.mp3" type="audio/mpeg">
</audio>

<!-- ══════════════ MEMORY MODAL ══════════════ -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">Anı Başlığı</h2>
        <div class="modal-date" id="modal-date">01.01.2024</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="photo-slider" id="photo-slider"></div>
      <div class="slider-nav" id="slider-nav">
        <button class="slider-btn" onclick="prevSlide()">‹</button>
        <div class="slider-dots" id="slider-dots"></div>
        <button class="slider-btn" onclick="nextSlide()">›</button>
      </div>
      <p class="modal-message" id="modal-message">Mesaj burada görünecek.</p>
    </div>
  </div>
</div>

<!-- ══════════════ FINAL / SEVİYORUM ══════════════ -->
<div id="final-overlay">
  <div class="final-content">
    <div class="final-hearts">💖</div>
    <div class="final-title">Seni Seviyorum</div>
    <div class="final-subtitle" id="final-message">
      Sen benim en güzel anımsın,<br>
      her gün seninle daha da güzel oluyor.
    </div>
    <button class="final-close" onclick="closeFinal()">Geri Dön ♡</button>
  </div>
</div>


<script>
/* ════════════════════════════════════════════
   📸 ANILARI BURADAN DÜZENLEYİN
   ════════════════════════════════════════════
   Her anı için:
     title   : Modal başlığı
     date    : Gösterilecek tarih
     message : Duygusal mesajınız
     photos  : Fotoğraf dosya yolları (dizi)
               → "photos/foto1.jpg" gibi
               → Fotoğraf yoksa [] bırakın, emoji gösterilir
     emoji   : Fotoğraf yoksa gösterilecek ikon
     isFinal : true ise "Seni Seviyorum" ekranı açılır
   ════════════════════════════════════════════ */
const memories = [
  {
    title: "İlk Günümüz",
    date: "14 Şubat 2023",
    message: "O gün seni ilk gördüğümde kalbim nasıl da hızlı çarptı... Seninle geçirdiğim her saniye çok kıymetli.",
    photos: [
      /* "photos/ilk-gun-1.jpg", */
      /* "photos/ilk-gun-2.jpg"  */
    ],
    emoji: "💌"
  },
  {
    title: "İlk Öpücük 🌹",
    date: "14 Şubat 2023",
    message: "Dudaklarına dokunduğumda dünya durdu sanki. O an hayatımın en güzel anıydı.",
    photos: [
      /* "photos/opucuk-1.jpg" */
    ],
    emoji: "🌹"
  },
  {
    title: "Fotoğraflarımız",
    date: "2023 — 2024",
    message: "Beraber çektiğimiz her kare, zamanı dondurmanın en güzel yolu. Sen her fotoğrafı aydınlatıyorsun.",
    photos: [
      /* "photos/foto1.jpg", */
      /* "photos/foto2.jpg", */
      /* "photos/foto3.jpg"  */
    ],
    emoji: "📸"
  },
  {
    title: "Özel Anlarımız ✨",
    date: "Tüm Zamanlar",
    message: "Sıradan bir günü olağanüstü kılma becerisine sahipsin. Seninle her an özel.",
    photos: [
      /* "photos/ozel-1.jpg", */
      /* "photos/ozel-2.jpg"  */
    ],
    emoji: "✨"
  },
  {
    title: "Şarkımız 🎵",
    date: "Her Zaman",
    message: "Bu şarkıyı her duyduğumda seni düşünüyorum. Seninle dinlendiğinde bambaşka bir anlam kazanıyor.",
    photos: [
      /* "photos/sarki-1.jpg" */
    ],
    emoji: "🎵"
  },
  {
    title: "Gecelerimiz 🌙",
    date: "Yıldızlı Geceler",
    message: "Yıldızlara baktığımızda her zaman aynı yıldızı gösteriyorsun bana. O yıldız artık bizim.",
    photos: [
      /* "photos/gece-1.jpg", */
      /* "photos/gece-2.jpg"  */
    ],
    emoji: "🌙"
  },
  {
    title: "Seni Seviyorum 💖",
    date: "Sonsuza Dek",
    message: "Sen benim her şeyimsin. Bugün ve her gün, seninleyim.",
    photos: [],
    emoji: "💖",
    isFinal: true,
    finalMessage: "Sen benim en güzel anımsın,<br>her gün seninle daha da güzel oluyor.<br><br>Seni sonsuza kadar seviyorum. 💖"
  }
];

/* ──────────────────────────────────────── */

let currentSlide = 0;
let currentMemory = null;
const musicEl = document.getElementById('bg-music');
const musicBtn = document.getElementById('music-btn');
let isMuted = true;

/* STARS */
(function createStars() {
  const sky = document.getElementById('sky');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*75}%;
      width:${size}px; height:${size}px;
      --dur:${2+Math.random()*4}s;
      --min:${0.1+Math.random()*0.4};
      animation-delay:${Math.random()*5}s;
    `;
    sky.appendChild(s);
  }
})();

/* HEART PARTICLES */
function spawnHeart() {
  const p = document.getElementById('particles');
  const el = document.createElement('div');
  el.className = 'heart-particle';
  el.textContent = ['💕','💗','💖','💝','✨','🌸'][Math.floor(Math.random()*6)];
  el.style.cssText = `
    left:${Math.random()*100}%;
    bottom:0;
    --spd:${5+Math.random()*8}s;
    animation-delay:${Math.random()*2}s;
    font-size:${10+Math.random()*14}px;
  `;
  p.appendChild(el);
  setTimeout(() => el.remove(), 14000);
}
setInterval(spawnHeart, 900);

/* PETAL RAIN */
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = ['🌸','🌺','🌷'][Math.floor(Math.random()*3)];
  el.style.cssText = `
    left:${Math.random()*100}%;
    --drift:${(Math.random()-0.5)*120}px;
    animation-duration:${6+Math.random()*6}s;
    animation-delay:${Math.random()*4}s;
    font-size:${8+Math.random()*10}px;
    opacity:${0.3+Math.random()*0.4};
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 14000);
}
setInterval(spawnPetal, 1800);

/* TYPEWRITER */
const introMsg = "Seninle geçirdiğim her an, kalbimde sakladığım en güzel hazine...";
let twIdx = 0;
function typeWrite() {
  if (twIdx <= introMsg.length) {
    document.getElementById('tw-span').textContent = introMsg.slice(0, twIdx);
    twIdx++;
    setTimeout(typeWrite, 55);
  }
}
typeWrite();

/* ENTER SITE */
function enterSite() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('scene').classList.add('visible');
  document.getElementById('site-title').classList.add('visible');
  tryPlayMusic();
}

function tryPlayMusic() {
  musicEl.play().then(() => {
    isMuted = false;
    musicBtn.textContent = '🎵';
    musicBtn.classList.add('playing');
  }).catch(() => {
    musicBtn.textContent = '🔇';
  });
}

function toggleMusic() {
  if (musicEl.paused) {
    musicEl.play();
    isMuted = false;
    musicBtn.textContent = '🎵';
    musicBtn.classList.add('playing');
  } else {
    musicEl.pause();
    isMuted = true;
    musicBtn.textContent = '🔇';
    musicBtn.classList.remove('playing');
  }
}

/* OPEN MEMORY */
function openMemory(idx) {
  const mem = memories[idx];
  currentMemory = mem;

  if (mem.isFinal) {
    document.getElementById('final-message').innerHTML = mem.finalMessage || mem.message;
    document.getElementById('final-overlay').classList.add('open');
    spawnFinalHearts();
    return;
  }

  document.getElementById('modal-title').textContent = mem.title;
  document.getElementById('modal-date').textContent = mem.date;
  document.getElementById('modal-message').textContent = mem.message;

  buildSlider(mem);
  currentSlide = 0;

  document.getElementById('modal-overlay').classList.add('open');
}

function buildSlider(mem) {
  const slider = document.getElementById('photo-slider');
  const dotsEl = document.getElementById('slider-dots');
  slider.innerHTML = '';
  dotsEl.innerHTML = '';

  const items = mem.photos && mem.photos.length > 0 ? mem.photos : [null];

  items.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'photo-slide' + (i === 0 ? ' active' : '');

    if (src) {
      const img = document.createElement('img');
      img.src = src;
      img.alt = mem.title;
      slide.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'photo-placeholder';
      ph.innerHTML = `<span>${mem.emoji}</span><p>Fotoğraf ekleyin</p>`;
      slide.appendChild(ph);
    }
    slider.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goSlide(i);
    dotsEl.appendChild(dot);
  });

  const nav = document.getElementById('slider-nav');
  nav.style.display = items.length > 1 ? 'flex' : 'none';
}

function goSlide(n) {
  const slides = document.querySelectorAll('.photo-slide');
  const dots = document.querySelectorAll('.dot');
  slides[currentSlide].classList.remove('active');
  dots[currentSlide].classList.remove('active');
  currentSlide = (n + slides.length) % slides.length;
  slides[currentSlide].classList.add('active');
  dots[currentSlide].classList.add('active');
}
function prevSlide() { const s = document.querySelectorAll('.photo-slide'); goSlide(currentSlide - 1); }
function nextSlide() { const s = document.querySelectorAll('.photo-slide'); goSlide(currentSlide + 1); }

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeFinal() {
  document.getElementById('final-overlay').classList.remove('open');
}

function spawnFinalHearts() {
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const p = document.getElementById('particles');
      const el = document.createElement('div');
      el.className = 'heart-particle';
      el.textContent = '💖';
      el.style.cssText = `
        left:${Math.random()*100}%;
        bottom:0;
        font-size:${16+Math.random()*20}px;
        --spd:${4+Math.random()*5}s;
      `;
      p.appendChild(el);
      setTimeout(() => el.remove(), 10000);
    }, i * 100);
  }
}

/* Keyboard: ESC closes modal */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModalDirect();
    closeFinal();
  }
  if (e.key === 'ArrowLeft') prevSlide();
  if (e.key === 'ArrowRight') nextSlide();
});
</script>
</body>
</html>
